<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cooked Fiat Open Graph image</title>
  <desc id="desc">A bold social card for the Cooked Fiat inflation calculator with red, yellow, blue, and black graphic blocks.</desc>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="0" y="452" width="1200" height="178" fill="#0A0A0A"/>
  <rect x="72" y="70" width="430" height="104" rx="2" transform="rotate(-2 72 70)" fill="#CC0000"/>
  <rect x="430" y="193" width="378" height="122" rx="2" transform="rotate(1.5 430 193)" fill="#FFD400"/>
  <rect x="88" y="356" width="460" height="92" rx="2" transform="rotate(-1 88 356)" fill="#1A56DB"/>
  <circle cx="1078" cy="114" r="38" fill="#0A0A0A"/>
  <circle cx="1036" cy="154" r="16" fill="#CC0000"/>
  <circle cx="1116" cy="170" r="14" fill="#1A56DB"/>

  <text x="106" y="142" fill="#FAF7F2" font-family="Arial Black, Arial, sans-serif" font-size="66" font-weight="900" letter-spacing="-1.5">
    cooked
  </text>
  <text x="454" y="279" fill="#0A0A0A" font-family="Georgia, Times New Roman, serif" font-size="76" font-weight="700" letter-spacing="-2">
    fiat
  </text>
  <text x="114" y="418" fill="#FAF7F2" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="-1">
    INFLATION CALCULATOR
  </text>

  <text x="76" y="528" fill="#FFD400" font-family="Georgia, Times New Roman, serif" font-size="64" font-weight="700" letter-spacing="-1.2">
    Compare any dollar amount across
  </text>
  <text x="76" y="592" fill="#FAF7F2" font-family="Georgia, Times New Roman, serif" font-size="64" font-weight="700" letter-spacing="-1.2">
    U.S. CPI years.
  </text>

  <rect x="846" y="246" width="260" height="218" rx="4" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="8"/>
  <text x="888" y="318" fill="#CC0000" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900">$100</text>
  <text x="886" y="365" fill="#444444" font-family="Arial, sans-serif" font-size="28" font-weight="700">in 2000</text>
  <text x="892" y="416" fill="#1A56DB" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900">= $182.50</text>
  <text x="886" y="452" fill="#444444" font-family="Arial, sans-serif" font-size="28" font-weight="700">in 2025</text>
</svg>
